services:
  db:
    image: postgres:17-alpine
    container_name: vaf-erp-db
    environment:
      POSTGRES_DB: vaf_erp
      POSTGRES_USER: vaf
      POSTGRES_PASSWORD: vaf
    ports:
      - "5432:5432"
    volumes:
      - vaf_erp_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U vaf -d vaf_erp" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vaf_erp_data: